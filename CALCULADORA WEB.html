<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora Web</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(0,255,180,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(0,180,255,0.06) 0%, transparent 60%);
      font-family: 'Share Tech Mono', monospace;
    }

    .calc-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .calc-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      letter-spacing: 6px;
      color: #00ffb4;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .calculator {
      width: 320px;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      padding: 24px;
      box-shadow:
        0 0 0 1px rgba(0,255,180,0.08),
        0 30px 80px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* --- PANTALLA --- */
    .display {
      background: #0d0d14;
      border: 1px solid #1a1a28;
      border-radius: 12px;
      padding: 16px 18px 12px;
      margin-bottom: 20px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
    }

    .display::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,180,0.3), transparent);
    }

    .expression {
      font-size: 12px;
      color: #3a3a5c;
      min-height: 18px;
      word-break: break-all;
      text-align: right;
      transition: color 0.2s;
    }

    .expression.has-content { color: #555577; }

    .result {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      color: #e8e8f0;
      letter-spacing: 2px;
      transition: color 0.2s;
      word-break: break-all;
      text-align: right;
    }

    .result.error { color: #ff5577; font-size: 16px; }
    .result.zero  { color: #3a3a5c; }

    /* --- GRILLA DE BOTONES --- */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      height: 58px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 17px;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s, background 0.1s;
      position: relative;
      overflow: hidden;
    }

    button:active { transform: scale(0.93); }

    /* Números */
    .btn-num {
      background: #181825;
      color: #c8c8e0;
      border: 1px solid #1e1e30;
      box-shadow: 0 3px 0 #0d0d18;
    }
    .btn-num:hover { background: #1e1e2e; color: #fff; }

    /* Operadores */
    .btn-op {
      background: #131320;
      color: #00ffb4;
      border: 1px solid rgba(0,255,180,0.15);
      font-size: 20px;
      box-shadow: 0 3px 0 #080810;
    }
    .btn-op:hover {
      background: rgba(0,255,180,0.08);
      border-color: rgba(0,255,180,0.4);
    }

    /* Paréntesis */
    .btn-paren {
      background: #12121e;
      color: #00bfff;
      border: 1px solid rgba(0,191,255,0.15);
      font-size: 18px;
      box-shadow: 0 3px 0 #080810;
    }
    .btn-paren:hover {
      background: rgba(0,191,255,0.07);
      border-color: rgba(0,191,255,0.35);
    }

    /* Igual */
    .btn-eq {
      background: linear-gradient(135deg, #00ffb4 0%, #00c8ff 100%);
      color: #080810;
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 700;
      border: none;
      box-shadow: 0 3px 0 #007a60, 0 0 20px rgba(0,255,180,0.15);
    }
    .btn-eq:hover { box-shadow: 0 3px 0 #007a60, 0 0 30px rgba(0,255,180,0.3); }

    /* Clear / Delete */
    .btn-clear {
      background: #1a1015;
      color: #ff5577;
      border: 1px solid rgba(255,85,119,0.2);
      font-size: 13px;
      letter-spacing: 1px;
      box-shadow: 0 3px 0 #0d080c;
    }
    .btn-clear:hover { background: rgba(255,85,119,0.08); border-color: rgba(255,85,119,0.4); }

    .btn-del {
      background: #151215;
      color: #ff7799;
      border: 1px solid rgba(255,85,119,0.15);
      font-size: 20px;
      box-shadow: 0 3px 0 #0d080c;
    }
    .btn-del:hover { background: rgba(255,85,119,0.07); }

    /* Span-2 (cero) */
    .span2 { grid-column: span 2; }

    /* Nivel de paréntesis */
    .paren-indicator {
      font-size: 10px;
      color: rgba(0,191,255,0.4);
      letter-spacing: 2px;
      text-align: right;
      margin-top: 4px;
      min-height: 14px;
      transition: color 0.3s;
    }
    .paren-indicator.active { color: #00bfff; }

    /* Animación de resultado */
    @keyframes popIn {
      0%   { transform: scale(0.95); opacity: 0.5; }
      60%  { transform: scale(1.03); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .pop { animation: popIn 0.2s ease; }
  </style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calc-title">Calculadora Web</div>

  <div id="historial" style="
    width: 320px;
    max-height: 120px;
    overflow-y: auto;
    background: #0d0d14;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 12px;
    color: #555577;
    display: none;
  "></div>

  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result zero" id="result">0</div>
    </div>
    <div class="paren-indicator" id="parenIndicator"></div>

    <div class="buttons">
      <!-- Fila 1 -->
      <button class="btn-clear" onclick="clearAll()">CE</button>
      <button class="btn-paren" onclick="appendChar('(')">(</button>
      <button class="btn-paren" onclick="appendChar(')')">)</button>
      <button class="btn-del"   onclick="deleteLast()">⌫</button>

      <!-- Fila 2 -->
      <button class="btn-num" onclick="appendChar('7')">7</button>
      <button class="btn-num" onclick="appendChar('8')">8</button>
      <button class="btn-num" onclick="appendChar('9')">9</button>
      <button class="btn-op"  onclick="appendChar('/')">÷</button>

      <!-- Fila 3 -->
      <button class="btn-num" onclick="appendChar('4')">4</button>
      <button class="btn-num" onclick="appendChar('5')">5</button>
      <button class="btn-num" onclick="appendChar('6')">6</button>
      <button class="btn-op"  onclick="appendChar('*')">×</button>

      <!-- Fila 4 -->
      <button class="btn-num" onclick="appendChar('1')">1</button>
      <button class="btn-num" onclick="appendChar('2')">2</button>
      <button class="btn-num" onclick="appendChar('3')">3</button>
      <button class="btn-op"  onclick="appendChar('-')">−</button>

      <!-- Fila 5 -->
      <button class="btn-num span2" onclick="appendChar('0')">0</button>
      <button class="btn-num" onclick="appendChar('.')">.</button>
      <button class="btn-op"  onclick="appendChar('+')">+</button>

      <!-- Fila 6 -->
      <button class="btn-eq span2" onclick="calculate()">=</button>
      <button class="btn-op span2" onclick="appendChar('%')">% mod</button>
    </div>
  </div>
</div>

<script>

  // Variable que guarda lo que el usuario va escribiendo
  let expresion = "";

  // Esta variable me dice si el ultimo resultado ya fue calculado
  let ultimoFueResultado = false;

  // Aqui guardo los elementos de la pantalla para actualizarlos
  let elExpr   = document.getElementById("expression");
  let elResult = document.getElementById("result");
  let elParen  = document.getElementById("parenIndicator");

  // -------------------------------------------------------
  // SECCION 2: funciones de operaciones aritmeticas
  // -------------------------------------------------------

  // Funcion para sumar dos numeros
  function sumar(a, b) {
    return a + b;
  }

  // Funcion para restar dos numeros
  function restar(a, b) {
    return a - b;
  }

  // Funcion para multiplicar dos numeros
  function multiplicar(a, b) {
    return a * b;
  }

  // Funcion para dividir dos numeros
  // Usamos if/else para controlar que no se divida entre cero
  function dividir(a, b) {
    if (b === 0) {
      return "Error: no se puede dividir entre 0";
    } else {
      return a / b;
    }
  }

  // Funcion para calcular el modulo (residuo de la division)
  // Tambien controlamos que no se haga modulo entre cero
  function modulo(a, b) {
    if (b === 0) {
      return "Error: modulo entre cero no esta definido";
    } else {
      return a % b;
    }
  }

  // Funcion que decide cual operacion hacer segun el operador recibido
  // Estructura de control: if / else if / else
  function operacion(a, operador, b) {
    if (operador === '+') {
      return sumar(a, b);
    } else if (operador === '-') {
      return restar(a, b);
    } else if (operador === '*') {
      return multiplicar(a, b);
    } else if (operador === '/') {
      return dividir(a, b);
    } else if (operador === '%') {
      return modulo(a, b);
    } else {
      return "Operador no reconocido";
    }
  }

  // Funcion para validar que el resultado sea un numero valido
  // Si no es un numero mostramos un mensaje de error
  function validarResultado(valor) {
    if (isNaN(valor)) {
      return "Error: resultado no es un numero";
    } else if (!isFinite(valor)) {
      return "Error: resultado infinito";
    } else {
      return valor;
    }
  }

  // Esta funcion se llama cada vez que el usuario presiona un boton
  function appendChar(caracter) {

    // Si ya habia un resultado y el usuario escribe un numero, limpiamos
    if (ultimoFueResultado) {
      let esOperador = "+-*/%(".indexOf(caracter) !== -1;
      if (!esOperador) {
        expresion = "";
      }
      ultimoFueResultado = false;
    }

    let operadores = "+-*/%";
    let ultimoCaracter = expresion.slice(-1);

    // Multiplicacion implicita: si escribes 5( lo convierte en 5*(
    if (caracter === '(') {
      if (ultimoCaracter !== '' && (ultimoCaracter === ')' || (ultimoCaracter >= '0' && ultimoCaracter <= '9') || ultimoCaracter === '.')) {
        expresion += '*';
      }
    }

    // Multiplicacion implicita: si escribes )5 lo convierte en )*5
    if (ultimoCaracter === ')' && ((caracter >= '0' && caracter <= '9') || caracter === '(')) {
      expresion += '*';
    }

    // Si el usuario presiona dos operadores seguidos, reemplazamos el anterior
    if (operadores.indexOf(caracter) !== -1) {
      if (operadores.indexOf(ultimoCaracter) !== -1) {
        expresion = expresion.slice(0, -1);
      }
    }

    // Evitar que un numero tenga dos puntos decimales
    if (caracter === ".") {
      let partes = expresion.split(/[\+\-\*\/\%\(\)]/);
      let ultimaParte = partes[partes.length - 1];
      if (ultimaParte.indexOf(".") !== -1) {
        return;
      }
    }

    // Agregamos el caracter a la expresion
    expresion += caracter;
    actualizarPantalla();
  }

  // Funcion para borrar el ultimo caracter escrito
  function deleteLast() {
    if (ultimoFueResultado) {
      clearAll();
      return;
    }
    expresion = expresion.slice(0, -1);
    actualizarPantalla();
  }

  // Funcion para limpiar todo y volver a cero
  function clearAll() {
    expresion = "";
    ultimoFueResultado = false;
    elResult.textContent = "0";
    elResult.className = "result zero";
    elExpr.textContent = "";
    elExpr.className = "expression";
    elParen.textContent = "";
    elParen.className = "paren-indicator";
  }

  // Funcion para actualizar lo que se ve en la pantalla
  function actualizarPantalla() {
    // Mostramos * como × y / como ÷ para que se vea mejor
    let display = expresion.replace(/\*/g, "×").replace(/\//g, "÷");
    elExpr.textContent = display;
    elExpr.className = expresion ? "expression has-content" : "expression";

    // Contamos cuantos parentesis estan abiertos
    let abiertos = contarParentesisAbiertos(expresion);
    if (abiertos > 0) {
      elParen.textContent = "( ".repeat(abiertos) + " abierto" + (abiertos > 1 ? "s" : "");
      elParen.className = "paren-indicator active";
    } else {
      elParen.textContent = "";
      elParen.className = "paren-indicator";
    }

    // Si no hay nada escrito mostramos 0
    if (expresion === "") {
      elResult.textContent = "0";
      elResult.className = "result zero";
    }
  }

  // Funcion principal que calcula el resultado cuando se presiona =
  function calculate() {
    if (expresion === "") return;

    let resultado = evaluarExpresion(expresion);

    // Mostramos la expresion con los simbolos visuales
    let displayExpr = expresion.replace(/\*/g, "×").replace(/\//g, "÷");
    elExpr.textContent = displayExpr + " =";
    elExpr.className = "expression has-content";

    // Estructura de control if/else para manejar el resultado
    if (resultado.error) {

      // Si hay un error lo mostramos en pantalla
      elResult.textContent = resultado.mensaje;
      elResult.className = "result error";

      // document.write para mostrar el error en el historial
      document.getElementById("historial").style.display = "block";
      document.getElementById("historial").innerHTML +=
        "<p style='color:#ff5577'>❌ " + displayExpr + " → " + resultado.mensaje + "</p>";

    } else {

      let valor = resultado.valor;
      // Si el resultado tiene muchos decimales los recortamos
      let texto = Number.isFinite(valor) ? parseFloat(valor.toFixed(10)).toString() : "Error";

      elResult.textContent = texto;
      elResult.className = "result pop";

      void elResult.offsetWidth; // reinicia la animacion

      // document.write para mostrar la operacion en el historial
      document.getElementById("historial").style.display = "block";
      document.getElementById("historial").innerHTML +=
        "<p><span style='color:#555577'>" + displayExpr + "</span> = <strong style='color:#00ffb4'>" + texto + "</strong></p>";

      expresion = texto;
      ultimoFueResultado = true;
    }

    elParen.textContent = "";
    elParen.className = "paren-indicator";
  }

  // Esta funcion evalua la expresion completa
  // Usa las funciones sumar, restar, multiplicar y dividir
  function evaluarExpresion(expr) {
    let tokens = tokenizar(expr.replace(/\s/g, ""));
    if (!tokens) {
      return { error: true, mensaje: "Expresion invalida" };
    }

    let pos = { i: 0 };

    try {
      let valor = parseSuma(tokens, pos);
      if (pos.i < tokens.length) {
        return { error: true, mensaje: "Expresion invalida" };
      }
      if (!Number.isFinite(valor)) {
        return { error: true, mensaje: "No definido" };
      }
      return { error: false, valor: valor };
    } catch (e) {
      return { error: true, mensaje: e.message };
    }
  }

  // Convierte el texto de la expresion en una lista de tokens (numeros y operadores)
  function tokenizar(expr) {
    let tokens = [];
    let i = 0;

    while (i < expr.length) {
      let c = expr[i];

      // Si es un numero lo leemos completo (puede tener decimales)
      if ((c >= '0' && c <= '9') || c === '.') {
        let num = "";
        while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
          num += expr[i];
          i++;
        }
        tokens.push({ tipo: "NUM", valor: parseFloat(num) });
        continue;
      }

      // Si es un operador o parentesis lo guardamos
      if ("+-*/%()" .indexOf(c) !== -1) {
        tokens.push({ tipo: c });
        i++;
        continue;
      }

      // Si es algo que no reconocemos, hay un error
      return null;
    }
    return tokens;
  }

  // Maneja sumas y restas (nivel 1 de prioridad)
  function parseSuma(tokens, pos) {
    let izq = parseMulti(tokens, pos);

    while (pos.i < tokens.length) {
      let op = tokens[pos.i].tipo;
      if (op !== '+' && op !== '-') break;
      pos.i++;
      let der = parseMulti(tokens, pos);

      if (op === '+') {
        izq = sumar(izq, der);
      } else {
        izq = restar(izq, der);
      }
    }
    return izq;
  }

  // Maneja multiplicaciones, divisiones y modulo (nivel 2 de prioridad)
  function parseMulti(tokens, pos) {
    let izq = parseUnario(tokens, pos);

    while (pos.i < tokens.length) {
      let op = tokens[pos.i].tipo;
      if (op !== '*' && op !== '/' && op !== '%') break;
      pos.i++;
      let der = parseUnario(tokens, pos);

      // Usamos la funcion operacion() que tiene el if/else con cada caso
      let res = operacion(izq, op, der);

      // Validamos que el resultado sea un numero valido
      if (typeof res === 'string') {
        throw new Error(res);
      }
      izq = validarResultado(res);
      if (typeof izq === 'string') {
        throw new Error(izq);
      }
    }
    return izq;
  }

  // Maneja el signo negativo antes de un numero
  function parseUnario(tokens, pos) {
    if (pos.i < tokens.length && tokens[pos.i].tipo === '-') {
      pos.i++;
      return -parseUnario(tokens, pos);
    }
    if (pos.i < tokens.length && tokens[pos.i].tipo === '+') {
      pos.i++;
      return parseUnario(tokens, pos);
    }
    return parsePrimario(tokens, pos);
  }

  // Maneja numeros y expresiones entre parentesis (hasta 3 niveles de anidacion)
  function parsePrimario(tokens, pos) {
    if (pos.i >= tokens.length) {
      throw new Error("Expresion incompleta");
    }

    let token = tokens[pos.i];

    // Si es un numero simplemente lo devolvemos
    if (token.tipo === "NUM") {
      pos.i++;
      return token.valor;
    }

    // Si hay un parentesis, evaluamos lo que esta adentro
    // Esto permite hasta 3 niveles: ((( )))
    if (token.tipo === '(') {
      pos.i++; // abrimos el parentesis
      let val = parseSuma(tokens, pos); // evaluamos lo de adentro

      if (pos.i >= tokens.length || tokens[pos.i].tipo !== ')') {
        throw new Error("Falta cerrar un parentesis )");
      }
      pos.i++; // cerramos el parentesis
      return val;
    }

    throw new Error("Error en la expresion");
  }

  // Cuenta cuantos parentesis han sido abiertos y no cerrados todavia
  function contarParentesisAbiertos(expr) {
    let count = 0;
    for (let i = 0; i < expr.length; i++) {
      if (expr[i] === '(') count++;
      if (expr[i] === ')') count--;
    }
    if (count < 0) count = 0;
    return count;
  }

  // Soporte para usar la calculadora con el teclado fisico
  document.addEventListener("keydown", function(e) {
    let k = e.key;
    if ((k >= '0' && k <= '9') || k === '.' || "+-*/%()".indexOf(k) !== -1) {
      appendChar(k);
    } else if (k === 'Enter' || k === '=') {
      calculate();
    } else if (k === 'Backspace') {
      deleteLast();
    } else if (k === 'Escape') {
      clearAll();
    }
  });

</script>
</body>
</html>
